<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <label for="uname">Enter Name:</label>
        <input type="text" id="uname" placeholder="Enter Name">

        <br><br>

        <label for="uemail">Enter Email:</label>
        <input type="email" id="uemail">

        <br><br>

        <label for="ucolor">Favorite Color</label>
        <input type="color" id="ucolor">

        <br><br>

        <label for="urno">Enter rno:</label>
        <input type="number" name="" id="urno" max="100" min="50" step="4">

        <br><br>

        <label for="upw">Enter Password</label>
        <input type="password" name="" id="upw">

        <br><br>

        <input type="date" name="" id="">
        <!-- <input type="datetime" > -->
        <input type="time" name="" id="">

        <input type="submit">
    </form>

    <hr>

    <form action="">
        <label for="cars">Choose a car:</label>
        <select name="select_cars" id="cars">
            <option value="bmw">BMW</option>
            <option value="audi">Audi</option>
            <option value="merc">Mercedes</option>
        </select>

        <br><br>

        <label for="feedback">Provide your feedback</label>
        <textarea name="feedback" id="feedback" rows="10" cols="30">hey, there</textarea>

        <input type="submit">
    </form>

</body>
</html>
