<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in HTML</title>
</head>
<body>
    
    <!-- how to create a list in html?
     
        01. ordered list.
        02. unordered list.
        03. description list.
    -->

    <!-- ordered list -->

    <ol type="i" start="5">
        <li>BMW</li>
        <li>Audi</li>
        <li>VW</li>
        <li>Honda</li>
    </ol>

    <!-- unordered list -->

    <ul style="list-style-type: square;">
        <li>Sprite</li>
        <li>Coco-cola</li>
        <li>Fanta</li>
        <li>Pepsi</li>
    </ul>

    <!-- description list -->

    <dl>
        <dt>WHO</dt>
        <dd>- Who stands for world health organisation</dd>

        <dt>Coffee</dt>
        <dd>- A hot drink contains caffine.</dd>
    </dl>


    <!-- you can use them together, (one inside another) -->

    <ul>
        <li>Lorem ipsum dolor sit amet.</li>
        <ol>
            <li>Lorem ipsum dolor sit amet consectetur.</li>
            <li>Lorem, ipsum dolor.</li>
        </ol>
        <li>Lorem, ipsum.</li>
    </ul>

</body>
</html>
