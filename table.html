<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in HTML</title>
</head>
<body>
    <table border="4px" cellspacing="8px" cellpadding="5px">
        <caption>Employee of ABC Enterprises</caption>
        <tr>
            <th rowspan="3">heading</th>
            <td>item 1</td>
            <td><a href="https://www.google.com/">Google</a></td>
            <td>item 3</td>
        </tr>
        <tr>
            <!-- <th>heading 2</th> -->
            <td colspan="3">item 4</td>
            <!-- <td>item 5</td> -->
            <!-- <td>item 6</td> -->
        </tr>
        <tr>
            <!-- <th>heading 3</th> -->
            <td>item 7</td>
            <td><img src="img/cat.webp" alt="cat photo" height="50px"></td>
            <td>
                <table border="1px">
                    <tr>
                        <td>t 1</td>
                        <td>t 2</td>
                    </tr>
                    <tr>
                        <td>t 3</td>
                        <td>t 4</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
